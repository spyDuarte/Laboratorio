name: Deploy GitHub Pages

# Publica a interface web (pasta docs/) no GitHub Pages.
#
# Para ativar: no repositório, vá em Settings > Pages e defina
# "Source: GitHub Actions". A cada push na branch padrão o site é publicado
# em https://<usuario>.github.io/<repositorio>/

on:
  push:
    branches: ["main"]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
